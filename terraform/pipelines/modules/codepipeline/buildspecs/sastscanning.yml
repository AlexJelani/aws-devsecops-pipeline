version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      python: 3.12
    commands:
      - echo "Installing Snyk CLI..."
      - npm install -g snyk
      - snyk auth ${SNYK_TOKEN} # Authenticate using the Snyk token
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Preparing for Snyk dependency scanning..."
      - mkdir -p reports
      # Export dependency scan reports and keep demo pipeline moving even on findings.
      - snyk test --file=requirements.txt --severity-threshold=high --json-file-output=reports/snyk-deps.json --sarif-file-output=reports/snyk-deps.sarif || true
      - echo "Running Snyk code security checks..."
      # Export code scan reports (non-blocking) for review in build artifacts.
      - snyk code test --severity-threshold=high --json-file-output=reports/snyk-code.json --sarif-file-output=reports/snyk-code.sarif || true
  post_build:
    commands:
      - |
        python - <<'PY'
        import json
        from pathlib import Path

        report_files = [
          Path("reports/snyk-deps.json"),
          Path("reports/snyk-code.json"),
        ]

        def count_severities(node):
          counts = {"high": 0, "critical": 0}
          if isinstance(node, dict):
            severity = node.get("severity")
            if isinstance(severity, str):
              sev = severity.lower()
              if sev in counts:
                counts[sev] += 1
            for value in node.values():
              child_counts = count_severities(value)
              counts["high"] += child_counts["high"]
              counts["critical"] += child_counts["critical"]
          elif isinstance(node, list):
            for item in node:
              child_counts = count_severities(item)
              counts["high"] += child_counts["high"]
              counts["critical"] += child_counts["critical"]
          return counts

        total = {"high": 0, "critical": 0}
        for report_file in report_files:
          if not report_file.exists():
            print(f"{report_file}: missing")
            continue

          with report_file.open("r", encoding="utf-8") as fp:
            data = json.load(fp)

          counts = count_severities(data)
          total["high"] += counts["high"]
          total["critical"] += counts["critical"]
          print(f"{report_file}: high={counts['high']}, critical={counts['critical']}")

        print(f"Snyk severity summary: high={total['high']}, critical={total['critical']}")
        PY
      - echo "Snyk scanning completed."

artifacts:
  files:
    - reports/**/*
  discard-paths: no
